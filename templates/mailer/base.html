<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>LinkIT</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body { background: #f7f8fb; }
		.navbar-brand { font-weight: 600; }
		.card { box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
	</style>
</head>
<body>
<nav class="navbar navbar-expand bg-light mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">LinkIT</a>

        <div class="ms-auto">
            {% if user.is_authenticated %}
                <span class="me-2">Hello, {{ user.username }}</span>

                <!-- Logout as POST form to avoid HTTP 405 and to include CSRF -->
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                </form>

            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm me-2">Login</a>
                <a href="{% url 'signup' %}" class="btn btn-primary btn-sm">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
	{% for message in messages %}
		<div class="alert alert-{{ message.tags }} my-2">{{ message }}</div>
	{% endfor %}
	{% block content %}{% endblock %}
</div>
</body>
</html>
